<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Envato — Protected Prototype</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    padding: 24px;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #faf5ef;
    color: #191919;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #ffffff;
    border: 1px solid #e6e0d8;
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    text-align: center;
  }
  .lock {
    width: 48px; height: 48px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px;
    background: #87e64b;
    margin-bottom: 16px;
  }
  h1 { font-size: 20px; font-weight: 700; margin: 0 0 6px; }
  p.sub { font-size: 14px; color: #666; margin: 0 0 24px; line-height: 1.5; }
  form { display: flex; flex-direction: column; gap: 12px; }
  input[type="password"] {
    width: 100%;
    height: 48px;
    padding: 0 14px;
    font-size: 16px;
    border: 1px solid #ccc4b8;
    border-radius: 8px;
    outline: none;
    background: #fff;
    color: #191919;
  }
  input[type="password"]:focus { border-color: #191919; }
  button {
    height: 48px;
    border: 0;
    border-radius: 8px;
    background: #191919;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  .err {
    min-height: 18px;
    font-size: 13px;
    color: #c0392b;
    margin-top: 4px;
  }
  .foot { margin-top: 20px; font-size: 12px; color: #9a9186; }
</style>
</head>
<body>
  <main class="card">
    <div class="lock" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 10V8a6 6 0 1112 0v2" stroke="#191919" stroke-width="1.8" stroke-linecap="round"/>
        <rect x="4.5" y="10" width="15" height="10.5" rx="2.5" stroke="#191919" stroke-width="1.8"/>
        <circle cx="12" cy="15" r="1.6" fill="#191919"/>
      </svg>
    </div>
    <h1>Pricing Prototype — July 2026</h1>
    <p class="sub">This prototype is password protected. Enter the password to continue.</p>
    <form id="gate">
      <input id="pw" type="password" autocomplete="current-password" placeholder="Password" aria-label="Password" autofocus />
      <button id="submit" type="submit">Unlock</button>
      <div class="err" id="err" role="alert"></div>
    </form>
    <div class="foot">Envato · Confidential</div>
  </main>

<script>
  const SALT = "+68VFGUJLnNChgIqpiwUSA==";
  const IV = "5/nw0nmFv3KZudJ4";
  const CT = "TfNB7RXnj4k347IUD0FkR/Ng+CueM3HOlxdPrCAuagPDAdqZygpzv/q7hQ+xgUljScyi88d2NPcqagXNN9s0Q/EvUOr2P+mMe8r+8OG632oI7ZdJkIMD4rqxHVe97rUN1rQPQfMDnJm/7q/drA==";
  const ITER = 200000;

  const b64ToBytes = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const enc = new TextEncoder();

  async function deriveKey(password, salt) {
    const keyMaterial = await crypto.subtle.importKey(
      "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: ITER, hash: "SHA-256" },
      keyMaterial,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
  }

  async function unlock(password) {
    const key = await deriveKey(password, b64ToBytes(SALT));
    const buf = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: b64ToBytes(IV) },
      key,
      b64ToBytes(CT)
    );
    return new TextDecoder().decode(buf);
  }

  const form = document.getElementById("gate");
  const pw = document.getElementById("pw");
  const err = document.getElementById("err");
  const submit = document.getElementById("submit");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    err.textContent = "";
    submit.disabled = true;
    submit.textContent = "Unlocking…";
    try {
      const target = await unlock(pw.value);
      sessionStorage.setItem("proto_ok", "1");
      location.href = target;
    } catch (_) {
      err.textContent = "Incorrect password. Please try again.";
      submit.disabled = false;
      submit.textContent = "Unlock";
      pw.select();
    }
  });
</script>
</body>
</html>
